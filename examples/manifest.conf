# peststack example manifest
# Maintainer: Cognis Digital
#
# Declares a small, well-rounded assessment toolkit across phases. Records are
# separated by blank lines; each line is "KEY = VALUE". Recognized keys:
#   name (req) | category (req) | method (req: apt|pip|go|git)
#   package (opt) | version (opt) | desc (opt)
#
# AUTHORIZED USE ONLY. These are standard, openly distributed assessment
# utilities. peststack only provisions them; it performs no testing itself.

name     = nmap
category = scanning
method   = apt
package  = nmap
desc     = Network host/service discovery and port scanner

name     = masscan
category = scanning
method   = apt
package  = masscan
desc     = High-rate asynchronous TCP port scanner

name     = amass
category = recon
method   = go
package  = github.com/owasp-amass/amass/v4/...
version  = v4.2.0
desc     = Attack-surface mapping and asset discovery

name     = subfinder
category = recon
method   = go
package  = github.com/projectdiscovery/subfinder/v2/cmd/subfinder
desc     = Passive subdomain enumeration

name     = nikto
category = web
method   = apt
package  = nikto
desc     = Web server configuration and known-issue scanner

name     = wfuzz
category = web
method   = pip
package  = wfuzz
desc     = Web content/parameter fuzzing utility

name     = sqlmap
category = web
method   = pip
package  = sqlmap
desc     = Automated SQL injection detection and assessment

name     = dnsx
category = recon
method   = go
package  = github.com/projectdiscovery/dnsx/cmd/dnsx
desc     = Fast multipurpose DNS toolkit

name     = seclists
category = reporting
method   = git
package  = https://github.com/danielmiessler/SecLists.git
desc     = Reference wordlists and payload collections (data only)
